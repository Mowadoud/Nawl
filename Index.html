<!--
==============================================================================
 NAWL  -  BILINGUAL TEST LANDING PAGE  (GitHub Pages version)
 Everything we agreed on, in one file.
==============================================================================

WHAT THIS IS
  A smoke-test landing page to validate demand for handwoven Egyptian kilim in
  the UAE, BEFORE buying inventory. It measures real reservation intent, not
  clicks. Brand: NAWL, "handwoven Egyptian home", navy/gold identity, kilim as
  the first collection.

TWO LANGUAGE VERSIONS (switch top-right, fully separated EN / AR + RTL)
  yoursite/            -> English (default)
  yoursite/?lang=ar    -> Arabic     (point your Arabic ad here)
  yoursite/?lang=en    -> English    (point your English ad here)

THE 3 PRODUCTS (first drop), edit text/prices in the T block in the JS:
  1. Delta  / الدلتا  - 120x180 cm - AED 750 - reversible, hand wash, orange/grey
  2. Oasis  / الواحة  - 80x150 cm  - AED 490 - reversible, machine wash, multicolour
  3. Siwa   / سِيوة   - 70x140 cm  - AED 390 - reversible, machine wash, white/grey

SET BEFORE RUNNING ADS
  1. Meta Pixel: already set to 1029310640034932 (fires ViewContent,
     InitiateCheckout, and Lead on a confirmed reservation).
  2. Reservations (Formspree, because GitHub Pages has NO built-in forms):
     - Create a free form at formspree.io.
     - Copy its endpoint (looks like https://formspree.io/f/abcdwxyz).
     - Paste it into CONFIG.formspree in the JS below.
     - First submission triggers a confirmation email from Formspree; confirm it.
  3. (Optional) GA4: set CONFIG.ga4Id.

DEPLOY ON GITHUB PAGES
  1. Create a repo, add this file renamed to  index.html  at the repo root.
  2. Repo Settings > Pages > Source: Deploy from branch > main / root.
  3. For the domain nawl.ae: add a file named  CNAME  containing  nawl.ae
     then set the DNS record at your registrar to point to GitHub Pages.
     Settings > Pages > Custom domain > nawl.ae, and enable "Enforce HTTPS".
  NOTE: GitHub Pages cannot collect form submissions itself. Formspree does
  that here. (The Netlify version uses Netlify Forms instead.)

RUNNING THE TEST (what we agreed)
  - Optimise the campaign toward the  Lead  event, never clicks.
  - Budget ~ AED 70-100 / day for 10-14 days. Do not touch it for 3-4 days.
  - Buy 3-5 real sample rugs and shoot them; replace the product photos.
  - Track results daily in the test-plan sheet.

GO / NO-GO (tied to the unit economics)
  - Implied CAC <= AED 200  -> GO, order inventory.
  - AED 200 to 400          -> AMBER, optimise creative/audience/price, retest.
  - Above AED 400           -> NO-GO, rethink offer or price.

BEFORE LAUNCH: trademark check on "Nawl / نَوْل" in the UAE (classes 24 and 27),
confirm nawl.ae, and make sure the product photos are yours to use.
==============================================================================
-->

.hero .kick{font-size:.74rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:26px}
.hero h1{font-family:var(--fdisp);font-size:clamp(2.4rem,6.4vw,4.4rem);line-height:1.3;font-weight:600;margin-bottom:10px}
.hero .sub{font-family:var(--fdisp);font-style:italic;font-size:clamp(1.05rem,3vw,1.55rem);color:var(--sand)}
html[dir=rtl] .hero .sub{font-style:normal}
.hero p.desc{max-width:560px;margin:26px auto 0;color:rgba(245,239,226,.7);font-size:1.02rem}
.hero .band{width:100%;max-width:480px;height:22px;margin:36px auto 0;display:block}
.hero .drop{margin-top:30px;display:inline-flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:100px;padding:9px 18px;font-size:.82rem;color:var(--sand)}
.hero .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(200,162,75,.5)}70%{box-shadow:0 0 0 8px rgba(200,162,75,0)}100%{box-shadow:0 0 0 0 rgba(200,162,75,0)}}
@media (prefers-reduced-motion:reduce){.dot{animation:none}}

/* products */
.shop{padding:72px 0 40px}
.shop .head{text-align:center;margin-bottom:14px}
.shop .head .eyebrow{font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;color:var(--clay);margin-bottom:12px}
.shop .head h2{font-family:var(--fdisp);font-weight:500;font-size:clamp(1.9rem,4.4vw,2.6rem);color:var(--navy)}
.shop .head p{color:#5a5344;max-width:520px;margin:12px auto 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:26px;margin-top:44px}
.pcard{background:#fff;border:1px solid #e6dcc7;border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.pthumb{aspect-ratio:4/5;position:relative;background:var(--navy)}
.pthumb svg,.pthumb img{width:100%;height:100%;display:block;object-fit:cover}
.ribbon{position:absolute;top:14px;inset-inline-start:14px;background:var(--gold);color:var(--navy);font-size:.64rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:5px 11px;border-radius:100px}
.pbody{padding:18px 18px 20px;display:flex;flex-direction:column;gap:5px;flex:1}
.pbody .pname{font-family:var(--fdisp);font-size:1.5rem;color:var(--navy);line-height:1.1}
.pbody .spec{font-size:.82rem;color:#7a6f5b;margin-top:4px}
.pbody .spec2{margin-top:1px;color:#8a7f68}
.pbody .price{font-weight:600;color:var(--navy);margin-top:8px;font-size:1.05rem}
.pbody .reserve{margin-top:14px;background:var(--navy);color:var(--wool);border:none;font-family:var(--fbody);font-weight:600;font-size:.9rem;padding:12px;border-radius:6px;cursor:pointer;width:100%;transition:background .2s}
.pbody .reserve:hover{background:var(--navy-deep)}
.pbody .avail{font-size:.74rem;color:#9a8f78;margin-top:8px;text-align:center}

/* trust */
.trust{background:var(--navy);color:var(--wool);margin-top:50px;padding:46px 0}
.trust .row{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;text-align:center}
.trust .it .n{font-family:var(--fdisp);color:var(--gold);font-size:1.5rem;margin-bottom:6px}
.trust .it p{color:rgba(245,239,226,.66);font-size:.88rem}
@media(max-width:640px){.trust .row{grid-template-columns:1fr}}

/* footer */
footer{background:var(--navy-deep);color:rgba(245,239,226,.6);text-align:center;padding:54px 0;font-size:.84rem;border-top:1px solid var(--line)}
footer .n{font-family:var(--fdisp);color:var(--wool);font-size:2rem;margin-bottom:10px}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(18,21,28,.72);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:60;padding:22px}
.overlay.open{display:flex}
.modal{background:var(--wool);border-radius:12px;max-width:440px;width:100%;padding:32px;position:relative}
.modal .x{position:absolute;top:16px;inset-inline-end:18px;background:none;border:none;font-size:1.5rem;color:#9a8f78;cursor:pointer;line-height:1}
.modal .m-eyebrow{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--clay);margin-bottom:10px}
.modal h3{font-family:var(--fdisp);font-weight:500;font-size:1.5rem;color:var(--navy);line-height:1.25;margin-bottom:4px}
.modal .m-piece{font-family:var(--fdisp);color:var(--clay);font-size:1.2rem;margin-bottom:16px}
.field{margin-top:14px}
.field label{display:block;font-size:.8rem;font-weight:500;color:#5a5344;margin-bottom:6px}
.field input{width:100%;border:1px solid #d8ccb4;border-radius:7px;padding:12px 14px;font-family:var(--fbody);font-size:.95rem;background:#fff}
.field input:focus{outline:2px solid var(--gold);border-color:var(--gold)}
.opts{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.opt{border:1px solid #d8ccb4;border-radius:8px;padding:14px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:border-color .15s,background .15s}
.opt:hover{border-color:var(--gold)}
.opt.sel{border-color:var(--gold);background:#fbf5e7}
.opt input{margin-top:4px}
.opt .ot{font-weight:600;color:var(--navy);font-size:.92rem}
.opt .od{font-size:.8rem;color:#7a6f5b}
.submit{margin-top:20px;width:100%;background:var(--gold);color:var(--navy);border:none;font-family:var(--fbody);font-weight:600;font-size:.95rem;padding:14px;border-radius:8px;cursor:pointer}
.submit:hover{background:var(--gold-soft)}
.mini{font-size:.74rem;color:#9a8f78;text-align:center;margin-top:12px;line-height:1.6}
.hp{display:none}
.done{text-align:center;padding:14px 0}
.done .check{width:56px;height:56px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.done h3{font-family:var(--fdisp);color:var(--navy);margin-bottom:8px}
.done p{color:#5a5344;font-size:.92rem}
</style>
</head>
<body>
<nav>
  <div class="wrap row">
    <div class="brand">
      <svg viewBox="0 0 100 100" fill="none"><path d="M50 6 L94 50 L50 94 L6 50 Z" stroke="#C8A24B" stroke-width="3"/><path d="M50 34 L66 50 L50 66 L34 50 Z" fill="#C8A24B"/></svg>
      <span class="bw" data-i18n="brand_word"></span>
    </div>
    <div class="actions">
      <button class="langtoggle" id="langBtn" onclick="toggleLang()"></button>
      <button class="cta" data-i18n="nav_cta" onclick="openModal(-1)"></button>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="wrap">
    <div class="kick" data-i18n="hero_kick"></div>
    <h1 data-i18n="hero_h1"></h1>
    <div class="sub" data-i18n="hero_sub"></div>
    <p class="desc" data-i18n="hero_desc"></p>
    <svg class="band" viewBox="0 0 480 22" preserveAspectRatio="none" aria-hidden="true">
      <defs><pattern id="hb" width="40" height="22" patternUnits="userSpaceOnUse">
        <path d="M0 11 L10 3 L20 11 L30 3 L40 11" stroke="#C8A24B" stroke-width="1.3" fill="none"/>
        <path d="M0 11 L10 19 L20 11 L30 19 L40 11" stroke="#B4623E" stroke-width="1.3" fill="none"/>
        <path d="M20 7 L24 11 L20 15 L16 11 Z" fill="#E3D5BC"/></pattern></defs>
      <rect width="480" height="22" fill="url(#hb)"/>
    </svg>
    <div class="drop"><span class="dot"></span> <span data-i18n="hero_drop"></span></div>
  </div>
</header>

<section class="shop" id="shop">
  <div class="wrap">
    <div class="head">
      <div class="eyebrow" data-i18n="shop_eyebrow"></div>
      <h2 data-i18n="shop_h2"></h2>
      <p data-i18n="shop_p"></p>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</section>

<section class="trust">
  <div class="wrap">
    <div class="row">
      <div class="it"><div class="n" data-i18n="trust1_h"></div><p data-i18n="trust1_p"></p></div>
      <div class="it"><div class="n" data-i18n="trust2_h"></div><p data-i18n="trust2_p"></p></div>
      <div class="it"><div class="n" data-i18n="trust3_h"></div><p data-i18n="trust3_p"></p></div>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <div class="n" data-i18n="brand_word"></div>
    <div data-i18n="foot_desc"></div>
    <div style="margin-top:10px;opacity:.7">hello@nawl.ae</div>
  </div>
</footer>

<!-- RESERVE MODAL (Formspree, works on any static host incl. GitHub Pages) -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <button class="x" onclick="closeModal()" aria-label="close">×</button>
    <div id="formView">
      <div class="m-eyebrow" data-i18n="modal_eyebrow"></div>
      <h3 data-i18n="modal_h3"></h3>
      <div class="m-piece" id="mPiece"></div>
      <form id="reserveForm">
        <input type="hidden" name="piece" id="f_piece"/>
        <input type="hidden" name="price" id="f_price"/>
        <input type="hidden" name="lang" id="f_lang"/>
        <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px"/>
        <div class="field">
          <label data-i18n="label_email"></label>
          <input type="email" name="email" id="email" data-i18n-ph="ph_email" autocomplete="email" required/>
        </div>
        <div class="field">
          <label data-i18n="label_name"></label>
          <input type="text" name="name" data-i18n-ph="ph_name" autocomplete="name"/>
        </div>
        <button class="submit" type="submit" data-i18n="submit_reserve"></button>
        <div class="mini" data-i18n="modal_mini"></div>
      </form>
    </div>
    <div id="doneView" class="done" style="display:none">
      <div class="check"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M4 12.5 L10 18 L20 6" stroke="#1F2A44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h3 data-i18n="done_h3"></h3>
      <p id="doneMsg"></p>
    </div>
  </div>
</div>

/* woven placeholder patterns */
function weave(i){
  const bg='#1F2A44';
  const sets=[
    `<path d='M50 10 L86 50 L50 90 L14 50 Z' fill='none' stroke='#C8A24B' stroke-width='3'/><path d='M50 28 L68 50 L50 72 L32 50 Z' fill='none' stroke='#B4623E' stroke-width='3'/><path d='M50 40 L60 50 L50 60 L40 50 Z' fill='#C8A24B'/>`,
    `<path d='M20 20 L40 40 L20 60 L0 40 Z M60 20 L80 40 L60 60 L40 40 Z' fill='none' stroke='#C8A24B' stroke-width='2.4' transform='translate(10,10)'/><rect x='30' y='72' width='40' height='6' fill='#B4623E'/><rect x='30' y='20' width='40' height='6' fill='#E3D5BC'/>`,
    `<path d='M10 50 L30 30 L50 50 L70 30 L90 50 L70 70 L50 50 L30 70 Z' fill='none' stroke='#C8A24B' stroke-width='2.6'/><circle cx='50' cy='50' r='6' fill='#B4623E'/>`,
    `<path d='M50 6 L94 50 L50 94 L6 50 Z' fill='none' stroke='#B4623E' stroke-width='3'/><path d='M50 22 L78 50 L50 78 L22 50 Z' fill='none' stroke='#C8A24B' stroke-width='3'/><path d='M50 38 L62 50 L50 62 L38 50 Z' fill='#E3D5BC'/>`
  ];
  return `<svg viewBox='0 0 100 100' preserveAspectRatio='xMidYMid slice'>
    <defs><pattern id='p${i}' width='100' height='100' patternUnits='userSpaceOnUse'>
      <rect width='100' height='100' fill='${bg}'/>
      <path d='M0 8 L12 20 M88 20 L100 8 M0 92 L12 80 M88 80 L100 92' stroke='#E3D5BC' stroke-width='1.2'/>
      ${sets[i]}
    </pattern></defs><rect width='100' height='100' fill='url(#p${i})'/></svg>`;
}

function renderProducts(){
  const t=T[LANG], grid=document.getElementById('grid'); grid.innerHTML='';
  PRICES.forEach((price,i)=>{
    const wash = WASH[i]==='hand' ? t.lbl_handwash : t.lbl_machinewash;
    const el=document.createElement('div'); el.className='pcard';
    el.innerHTML=`
      <div class='pthumb'><img class='pimg' src='${IMAGES[i]}' alt='${t.name[i]}' loading='lazy'/><div class='ribbon'>${t.ribbon}</div></div>
      <div class='pbody'>
        <div class='pname'>${t.name[i]}</div>
        <div class='spec'>${t.lbl_wool} · ${t.size[i]}</div>
        <div class='spec spec2'>${t.lbl_reversible} · ${wash} · ${t.colour[i]}</div>
        <div class='price'>${t.price(price)}</div>
        <button class='reserve' onclick='openModal(${i})'>${t.card_reserve}</button>
        <div class='avail'>${t.card_avail}</div>
      </div>`;
    grid.appendChild(el);
  });
}

function applyLang(lang){
  LANG = (lang==='ar')?'ar':'en';
  const t=T[LANG];
  document.documentElement.lang=LANG;
  document.documentElement.dir=(LANG==='ar')?'rtl':'ltr';
  document.documentElement.className='lang-'+LANG;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n'); if(t[k]!==undefined) el.textContent=t[k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const k=el.getAttribute('data-i18n-ph'); if(t[k]!==undefined) el.setAttribute('placeholder',t[k]);
  });
  document.getElementById('langBtn').textContent=t.lang_switch;
  document.title = (LANG==='ar')?'نَوْل · كليم مصري يدوي':'Nawl · Handwoven Egyptian home';
  renderProducts();
  try{ localStorage.setItem('nawl_lang',LANG); }catch(e){}
}
function toggleLang(){ applyLang(LANG==='en'?'ar':'en'); }

/* analytics helpers */
function pixelReady(){return typeof fbq==='function' && CONFIG.metaPixelId && !CONFIG.metaPixelId.startsWith('YOUR');}
function gaReady(){return typeof gtag==='function' && CONFIG.ga4Id && CONFIG.ga4Id.indexOf('XXXX')<0;}
function track(metaEvent,gaEvent,params){params=params||{};
  try{if(pixelReady())fbq('track',metaEvent,params);}catch(e){}
  try{if(gaReady())gtag('event',gaEvent,params);}catch(e){}
  console.log('[track]',metaEvent,'/',gaEvent,params);
}

/* modal */
let current={i:-1,name:'',price:0};
function openModal(i){
  const t=T[LANG];
  if(i>=0){current={i,name:t.name[i],price:PRICES[i]};
    document.getElementById('mPiece').textContent=t.name[i]+' · '+t.price(PRICES[i]);
  }else{current={i:-1,name:t.shop_eyebrow,price:0};
    document.getElementById('mPiece').textContent=t.shop_eyebrow;
  }
  document.getElementById('f_piece').value=current.name;
  document.getElementById('f_price').value=current.price;
  document.getElementById('f_lang').value=LANG;
  document.getElementById('formView').style.display='block';
  document.getElementById('doneView').style.display='none';
  document.getElementById('overlay').classList.add('open');
  track('InitiateCheckout','begin_checkout',{content_name:current.name,value:current.price,currency:CURRENCY});
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

document.getElementById('reserveForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const t=T[LANG], form=e.target;
  const email=form.email.value.trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ form.email.focus(); form.email.style.borderColor='#B4623E'; return; }
  const btn=form.querySelector('.submit'); btn.disabled=true;
  // confirmed reservation = Lead (optimise the campaign to this)
  track('Lead','generate_lead',{content_name:current.name,value:current.price,currency:CURRENCY});
  try{
    if(CONFIG.formspree && CONFIG.formspree.indexOf('YOUR_FORM_ID')<0){
      await fetch(CONFIG.formspree,{method:'POST',body:new FormData(form),headers:{'Accept':'application/json'}});
    }
  }catch(err){}
  document.getElementById('doneMsg').textContent=t.done_msg;
  document.getElementById('formView').style.display='none';
  document.getElementById('doneView').style.display='block';
  btn.disabled=false;
});

/* init: URL ?lang= wins, then saved, then default en */
(function(){
  let lang='en';
  try{const u=new URLSearchParams(location.search).get('lang'); if(u==='ar'||u==='en')lang=u;
    else{const s=localStorage.getItem('nawl_lang'); if(s)lang=s;}}catch(e){}
  applyLang(lang);
  window.addEventListener('load',()=>track('ViewContent','view_item_list',{content_name:'first_drop'}));
})();
</script>
